<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEMATIQ - Editor de Proyecto | Sistema de Cotizaciones</title>
  <meta name="description" content="Editor de cotización Excel-like - DEMATIQ Automatización">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Questrial&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="proyecto-page">

    <div class="proyecto-topbar">
      <button class="btn-icon" onclick="goBack()" title="Volver al Dashboard"><i class="fas fa-arrow-left"></i></button>
      <div class="proyecto-title-area">
        <h1 id="proyecto-nombre">Nombre del Proyecto</h1>
        <span id="proyecto-numero" class="badge badge-cyan">No. ---</span>
      </div>
      <div class="proyecto-actions">
        <button class="btn btn-success" id="btn-save" onclick="saveProject()"><i class="fas fa-save"></i> Guardar</button>
        <button class="btn btn-primary" id="btn-pdf" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> Generar PDF</button>
        <button class="btn btn-warning" onclick="convertToUSD()"><i class="fas fa-dollar-sign"></i> Tipo Cambio</button>
        <button class="btn btn-warning" id="btn-carpeta" onclick="openFolderLink()" title="Abrir carpeta del proyecto"><i class="fas fa-folder-open"></i> Carpeta</button>
      </div>
    </div>

    <div class="proyecto-header card" style="margin-bottom:12px;">
      <div class="header-toggle" onclick="toggleHeader()">
        <h3><i class="fas fa-info-circle" style="color:var(--accent);margin-right:8px;"></i>Información del Proyecto</h3>
        <i class="fas fa-chevron-up" id="header-chevron"></i>
      </div>
      <div id="header-content" class="header-content">
        <div class="header-grid">
          <div class="header-col">
            <div class="field-group">
              <label>Atención:</label>
              <input type="text" id="field-atencion" class="input-field" placeholder="A la atención de...">
            </div>
            <div class="field-group">
              <label>Teléfono:</label>
              <input type="text" id="field-telefono" class="input-field" placeholder="Teléfono de contacto">
            </div>
            <div class="field-group">
              <label>Empresa:</label>
              <input type="text" id="field-empresa" class="input-field" placeholder="Nombre de la empresa">
            </div>
            <div class="field-group">
              <label>E-mail:</label>
              <input type="email" id="field-email" class="input-field" placeholder="email@empresa.com">
            </div>
          </div>
          <div class="header-col">
            <div class="field-group">
              <label>Cotización No.:</label>
              <span id="field-numero" class="field-display">---</span>
            </div>
            <div class="field-group">
              <label>Fecha:</label>
              <input type="date" id="field-fecha" class="input-field">
            </div>
            <div class="field-group">
              <label>Vencimiento:</label>
              <input type="date" id="field-vencimiento" class="input-field">
            </div>
            <div class="field-group">
              <label>Tipo Cambio USD:</label>
              <input type="number" id="field-tipo-cambio" class="input-field" step="0.01" value="20.00">
            </div>
          </div>
        </div>
        <div class="field-group full-width">
          <label>Referencia:</label>
          <input type="text" id="field-referencia" class="input-field" placeholder="Referencia del proyecto">
        </div>
        <div class="field-group full-width">
          <label>Descripción de la Solución:</label>
          <textarea id="field-descripcion" class="input-field" rows="2" placeholder="Descripción detallada..."></textarea>
        </div>
        <div class="field-group full-width">
          <label>Carpeta del Proyecto:</label>
          <div id="carpeta-field-container">
            <input type="text" id="field-carpeta" class="input-field" placeholder="Ruta a la carpeta del proyecto">
          </div>
        </div>
      </div>
    </div>

    <div class="tabs-bar" id="tabs-bar">
    </div>

    <div id="tab-content" class="tab-content card">
    </div>

    <div class="totals-bar card">
      <div class="totals-grid">
        <div class="total-item">
          <span class="total-label">SUBTOTAL</span>
          <span class="total-value" id="total-subtotal">$0.00</span>
        </div>
        <div class="total-item">
          <span class="total-label">IVA (16%)</span>
          <span class="total-value" id="total-iva">$0.00</span>
        </div>
        <div class="total-item total-highlight">
          <span class="total-label">TOTAL MN</span>
          <span class="total-value" id="total-mn">$0.00</span>
        </div>
        <div class="total-item">
          <span class="total-label">TOTAL USD</span>
          <span class="total-value" id="total-usd">$0.00</span>
        </div>
      </div>
      <div id="total-letras" class="total-letras"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-usd">
    <div class="modal">
      <h2 class="modal-title"><i class="fas fa-exchange-alt" style="color:var(--warning);margin-right:8px;"></i>Tipo de Cambio</h2>
      <p class="modal-subtitle">Actualiza el tipo de cambio para recalcular todos los montos</p>
      <div class="modal-field">
        <label for="usd-tipo-cambio">Tipo de Cambio (MXN/USD)</label>
        <input type="number" id="usd-tipo-cambio" class="input-field" step="0.01" value="20.00">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('modal-usd')">Cancelar</button>
        <button class="btn btn-warning" onclick="applyUSDConversion()"><i class="fas fa-sync-alt"></i> Aplicar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/proyecto.js"></script>
  <script src="js/pdf.js"></script>
</body>
</html>
