<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>{% block title %}DEMATIQ Cotizaciones{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    * { font-family: 'Inter', sans-serif; }
    :root {
      --brand: #1a3a6b;
      --brand-light: #eff6ff;
      --brand-glow: rgba(26, 58, 107, 0.25);
      --brand-glow-strong: rgba(26, 58, 107, 0.4);
    }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .btn-primary {
      background: linear-gradient(135deg, #0f2847, #1a3a6b);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #1a3a6b, #0f2847);
    }
    .card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.06) !important;
    }
    .btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 58, 107, 0.2) !important;
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn i {
      transition: transform 0.3s ease;
    }
    .btn:hover i.fa-plus {
      transform: rotate(90deg);
    }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.92) translateY(15px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.open .modal-card { transform: scale(1) translateY(0); }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999;
      background: white;
      border-radius: 12px;
      padding: 14px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      border-left: 4px solid #1a3a6b;
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; font-weight: 500;
      transform: translateX(120%);
      transition: transform 0.35s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast.success { border-color: #16a34a; }
    .toast.error { border-color: #dc2626; }
    .toast.warning { border-color: #d97706; }
    .tab-btn {
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-radius: 8px 8px 0 0;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      color: white;
      opacity: 0.8;
      position: relative;
    }
    .excel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .excel-table th {
      background: #f8fafc;
      color: #374151;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 10px 12px;
      border-bottom: 2px solid #e5e7eb;
      text-align: left;
      white-space: nowrap;
    }
    .excel-table td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .excel-table tr:hover td { background: #f0f4ff; }
    .excel-input {
      border: 1.5px solid transparent;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 13px;
      width: 100%;
      background: transparent;
      outline: none;
      transition: all 0.2s ease;
    }
    .excel-input:hover {
      border-color: #cbd5e1;
      background: rgba(255,255,255,0.5);
    }
    .excel-input:focus {
      border-color: #1a3a6b;
      background: white;
      box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.2);
    }
    .excel-select {
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .excel-select:hover {
      border-color: #1a3a6b;
      box-shadow: 0 2px 8px rgba(26, 58, 107, 0.15);
    }
    .excel-select:focus {
      border-color: #1a3a6b;
      box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.2);
    }
    .total-row { background: linear-gradient(135deg, #0f2847, #1a3a6b); color: white; }
    .total-row td { font-weight: 700; color: white; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #1a3a6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-light text-dark min-vh-100">
  {% block content %}{% endblock %}
  <div id="toast" class="toast">
    <i id="toast-icon" class="fa-solid fa-check-circle text-success"></i>
    <span id="toast-msg"></span>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      showToast('Error JS: ' + msg + ' (Línea ' + line + ')', 'error');
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      showToast('Error Promesa: ' + e.reason, 'error');
    });

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      const ico = document.getElementById('toast-icon');
      const m = document.getElementById('toast-msg');
      t.className = 'toast ' + type;
      const icons = {success:'fa-check-circle text-success',error:'fa-times-circle text-danger',warning:'fa-exclamation-circle text-warning'};
      ico.className = 'fa-solid ' + (icons[type]||icons.success);
      m.textContent = msg;
      t.classList.add('show');
      setTimeout(()=> t.classList.remove('show'), 3500);
    }
    function openModal(id) {
      document.getElementById(id).classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
      document.body.style.overflow = '';
    }
    async function api(url, method='GET', body=null) {
      const opts = { method, headers: {'Content-Type':'application/json'} };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(url, opts);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Error en la solicitud');
      return d;
    }
    function fmt(n) {
      const v = parseFloat(n)||0;
      return '$' + v.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function debounce(fn,ms) {
      let t; return (...args) => { clearTimeout(t); t=setTimeout(()=>fn(...args),ms); };
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
